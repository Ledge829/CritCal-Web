<main class="characters-page" id="main-content">

<section class="page-heading fade-up">
    <p class="eyebrow">108 Characters</p>
    <h1>Characters</h1>
    <p class="subtitle">
        Tap a character to jump straight into analyzing their build.
    </p>
</section>

<div class="filter-bar fade-up fade-up-1">

    <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Search a character..." autocomplete="off" aria-label="Search characters">
    </div>

    <div class="element-pills" id="element-pills" role="group" aria-label="Filter by element">
        <button type="button" class="element-pill is-active" data-element="" aria-pressed="true">All</button>
        <button type="button" class="element-pill" data-element="pyro" style="--el-color:#E0785C" aria-pressed="false">Pyro</button>
        <button type="button" class="element-pill" data-element="hydro" style="--el-color:#5B9BD6" aria-pressed="false">Hydro</button>
        <button type="button" class="element-pill" data-element="anemo" style="--el-color:#6BC7AE" aria-pressed="false">Anemo</button>
        <button type="button" class="element-pill" data-element="electro" style="--el-color:#B18FE0" aria-pressed="false">Electro</button>
        <button type="button" class="element-pill" data-element="dendro" style="--el-color:#97BE58" aria-pressed="false">Dendro</button>
        <button type="button" class="element-pill" data-element="cryo" style="--el-color:#83C6DE" aria-pressed="false">Cryo</button>
        <button type="button" class="element-pill" data-element="geo" style="--el-color:#D6B96C" aria-pressed="false">Geo</button>
    </div>

</div>

<p id="result-count" class="result-count" role="status"></p>

<div id="character-grid" class="character-grid"></div>

</main>
