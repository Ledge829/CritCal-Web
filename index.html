<script src="portraits.js"></script>
<script>
    // Featured character + recent-updates portraits, all resolved
    // through the same centralized helper the browse page uses --
    // never a hardcoded <img> path.
    document.getElementById("featured-portrait").innerHTML =
        portraitInnerHtml({ key: "furina", name: "Furina", element: "hydro" });

    document.querySelectorAll("#recent-updates-list .update-row").forEach((row) => {
        const c = { key: row.dataset.key, name: row.dataset.name, element: row.dataset.element };
        row.querySelector(".update-avatar").innerHTML = portraitInnerHtml(c);
    });
</script>
